name: Pipeline Ser Estudiante

on:
  schedule:
    # Día 1 de cada mes, 06:00 UTC (01:00 hora Ecuador)
    - cron: "0 6 1 * *"
  workflow_dispatch: {}   # permite correrlo manualmente desde la pestaña Actions (botón "Run workflow")

permissions:
  contents: write   # necesario para que el job pueda hacer commit/push de data/processed/

concurrency:
  group: pipeline-ser-estudiante
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar y detectar cambios en la fuente
        run: python pipeline/descargar.py

      - name: Verificar si hubo cambios
        id: check
        run: |
          if [ -f data/raw/cambios_detectados.json ]; then
            echo "hubo_cambios=true" >> "$GITHUB_OUTPUT"
          else
            echo "hubo_cambios=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Procesar datos (solo si hubo cambios)
        if: steps.check.outputs.hubo_cambios == 'true'
        run: python pipeline/procesar.py

      - name: Commit y push de los datos actualizados
        if: steps.check.outputs.hubo_cambios == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          git diff --staged --quiet || git commit -m "Actualización automática del pipeline ($(date +%Y-%m-%d))"
          git push
